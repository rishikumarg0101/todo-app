<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0f0f0f;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      .container {
        width: 100%;
        max-width: 520px;
      }

      h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtitle {
        color: #666;
        font-size: 14px;
        margin-bottom: 32px;
      }

      .input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 32px;
      }

      input {
        flex: 1;
        padding: 14px 16px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        color: white;
        font-size: 15px;
        outline: none;
        transition: border 0.2s;
      }

      input:focus {
        border-color: #667eea;
      }

      input::placeholder {
        color: #444;
      }

      button.add-btn {
        padding: 14px 20px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
        white-space: nowrap;
      }

      button.add-btn:hover {
        opacity: 0.85;
      }

      .todo-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .todo-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 18px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        transition: border 0.2s;
      }

      .todo-item:hover {
        border-color: #3a3a3a;
      }

      .todo-text {
        font-size: 15px;
        color: #e0e0e0;
      }

      .delete-btn {
        background: none;
        border: none;
        color: #444;
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 8px;
        transition: color 0.2s, background 0.2s;
        line-height: 1;
      }

      .delete-btn:hover {
        color: #ff4f4f;
        background: #2a1a1a;
      }

      .empty {
        text-align: center;
        color: #444;
        font-size: 14px;
        padding: 40px 0;
      }

      .count {
        font-size: 13px;
        color: #555;
        margin-bottom: 12px;
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 26px;
        }
        body {
          padding: 24px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>My Todos</h1>
      <p class="subtitle">Stay on top of your day</p>

      <div class="input-row">
        <input id="input" placeholder="What needs to be done?" />
        <button class="add-btn" onclick="addTodo()">Add</button>
      </div>

      <div class="count" id="count"></div>
      <ul class="todo-list" id="list"></ul>
    </div>

    <script>
      const SERVER = "";

      async function loadTodos() {
        const res = await fetch(`${SERVER}/todos`);
        const todos = await res.json();
        const list = document.getElementById("list");
        const count = document.getElementById("count");

        count.textContent = todos.length > 0 ? `${todos.length} task${todos.length > 1 ? "s" : ""}` : "";

        if (todos.length === 0) {
          list.innerHTML = `<div class="empty">No todos yet. Add one above! 🎉</div>`;
          return;
        }

        list.innerHTML = "";
        todos.forEach((todo) => {
          list.innerHTML += `
            <li class="todo-item">
              <span class="todo-text">${todo.text}</span>
              <button class="delete-btn" onclick="deleteTodo(${todo.id})">✕</button>
            </li>`;
        });
      }

      async function addTodo() {
        const input = document.getElementById("input");
        if (!input.value.trim()) return;
        await fetch(`${SERVER}/todos`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ todo: input.value }),
        });
        input.value = "";
        loadTodos();
      }

      document.getElementById("input").addEventListener("keypress", (e) => {
        if (e.key === "Enter") addTodo();
      });

      async function deleteTodo(id) {
        await fetch(`${SERVER}/todos/${id}`, { method: "DELETE" });
        loadTodos();
      }

      loadTodos();
    </script>
  </body>
</html>
